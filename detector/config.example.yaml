slack:
  webhook_url: "YOUR_SLACK_WEBHOOK_URL"

log:
  path: "/var/log/nginx/hng-access.log"
  audit_path: "/app/data/audit.log"

detection:
  per_ip_window_seconds: 60
  global_window_seconds: 60
  baseline_window_seconds: 1800
  baseline_recalc_interval_seconds: 60
  z_score_threshold: 0.5
  rate_multiplier_threshold: 1.5
  error_surge_multiplier: 3.0
  tightened_z_score: 2.0
  tightened_rate_multiplier: 3.0
  min_baseline_samples: 30
  baseline_mean_floor: 1.0
  baseline_stddev_floor: 0.5

blocking:
  ban_durations_minutes: [10, 30, 120, -1]

dashboard:
  port: 8080
  refresh_interval_seconds: 3
