version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost
    restart: unless-stopped

  detector:
    build: ./detector
    container_name: hng-detector
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
      - detector_data:/app/data
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:
  detector_data:
